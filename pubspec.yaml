name: urdu_keyboard
description: "A beautiful Urdu Keyboard App with Jameel Noori Nastaleeq font."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  fonts:
    - family: Jameel_Noori_Nastaleeq
      fonts:
        - asset: assets/fonts/Jameel_Noori_Nastaleeq.ttf
